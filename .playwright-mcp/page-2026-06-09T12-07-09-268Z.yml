          - heading "Documentation" [level=1] [ref=e33]
          - paragraph [ref=e34]: How OmniCurve works, from first principles to contract architecture.
        - generic [ref=e35]:
          - heading "The Problem" [level=2] [ref=e36]
          - generic [ref=e37]:
            - paragraph [ref=e38]: "Traditional prediction markets create discrete binary pools: \"Will BTC hit $100k? Yes/No.\" Each price point needs its own pool — fragmenting liquidity across hundreds of separate markets."
            - paragraph [ref=e39]: A market-maker offering prices at $90k, $95k, $100k, $105k, and $110k needs five separate pools, each with its own liquidity providers and depth. This means capital is locked up inefficiently, and thin pools produce poor price discovery.
        - generic [ref=e40]:
          - heading "The Solution" [level=2] [ref=e41]
          - generic [ref=e42]:
            - paragraph [ref=e43]:
              - text: OmniCurve replaces N binary pools with a single pool governed by a
              - strong [ref=e44]: Gaussian probability distribution
              - text: . One pool serves all strike prices simultaneously.
            - img [ref=e47]:
              - generic [ref=e51]:
                - generic [ref=e54]: "50"
                - generic [ref=e56]: "100"
                - generic [ref=e58]: "150"
            - paragraph [ref=e59]: Liquidity providers deposit once into the single pool and earn fees from all strikes. The distribution's mean (μ) represents the market's expected outcome, and sigma (σ) represents uncertainty. Both are set by LPs.
        - generic [ref=e60]:
          - heading "How Pricing Works" [level=2] [ref=e61]
          - generic [ref=e62]:
            - paragraph [ref=e63]: "The probability of any outcome is derived from the cumulative distribution function (CDF) of the Gaussian distribution:"
            - generic [ref=e64]:
              - paragraph [ref=e65]: P_YES(x) = 1 − CDF(x, μ, σ)
              - paragraph [ref=e66]: P_NO(x) = CDF(x, μ, σ)
            - paragraph [ref=e67]: "Drag the slider below to see how the strike price changes the probability split between YES and NO:"
