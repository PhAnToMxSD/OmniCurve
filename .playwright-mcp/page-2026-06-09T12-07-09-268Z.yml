            - paragraph [ref=e112]: The CDF is computed entirely on-chain using an Abramowitz & Stegun 5-coefficient error function approximation, providing ~11 significant digits of precision with fixed-point (WAD, 1e18) arithmetic.
        - generic [ref=e113]:
          - heading "For Traders" [level=2] [ref=e114]
          - generic [ref=e115]:
            - paragraph [ref=e116]:
              - text: To trade on a market, choose a
              - strong [ref=e117]: strike price
              - text: "and a direction: YES (outcome exceeds strike) or NO (outcome at or below strike)."
            - paragraph [ref=e118]: You pay USDC proportional to the probability. If the market resolves in your direction, you can redeem your tokens 1:1 for USDC. A 1% fee is deducted from each trade and distributed to liquidity providers.
            - paragraph [ref=e119]:
              - text: Settlement is currently manual — the market owner calls
              - code [ref=e120]: settleByPrice(finalPrice)
              - text: . A two-phase resolution with a 24-hour timelock provides a dispute window.
        - generic [ref=e121]:
          - heading "For Liquidity Providers" [level=2] [ref=e122]
          - generic [ref=e123]:
            - paragraph [ref=e124]: Deposit USDC into a market's AMM contract to receive non-transferable LP tokens representing your share of the pool. Before the first trade, you can also set the distribution parameters (μ, σ) to shift the market's expected outcome.
            - paragraph [ref=e125]:
              - text: Fees from all trades are distributed to LPs using a
              - strong [ref=e126]: MasterChef-style accumulator
              - text: ": a global acc_fee_per_share value increases with each trade, and each LP's pending fees = their shares × acc_fee_per_share − their reward_debt."
            - paragraph [ref=e127]: LP tokens are non-transferable by design — this simplifies fee accounting and prevents complex reward_debt migration logic.
